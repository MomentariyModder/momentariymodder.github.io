	<a href="#iaam-blocks" class="btn">Blocks</a>
	<a href="#iaam-items" class="btn">Items</a><br>
	This is another money mod for Minecraft. The mod adds: Dollar bills and their stacks, powerful tools, new bullion and menirals, food and ore.<br>
	To create a 1 dollar bill you will need: thread, paper, wool and gold. Once you have gotten the resources you need, use them to make Cotton Sheet and Linen Sheet. Then combine all the sheets with the gold to make a 1 dollar bill.<br>
	To create other dollar bills, use the bills themselves, for example you can make a 2 dollar bill from 2 1-dollar bills.

	New ore appearing in the overworlds, at heights from -64 to 16. This ore is mined with at least a diamond pickaxe. This ore drops one 1-dollar bill, and if you have the Fortune enchantment, the number increases to 4 at a time.
