	<h1 align="center">Drop Modifold and Skip 1.21.8</h1>
	<i>24.01.2026, 11:00</i><br>
	</div>
	<p>
	Hello to all readers of this post!<br><br>
	Today I have a few announcements to make. Let's go!<br><br>
	<h2>Drop Modifold</h2>
	In my last post, I announced the publication of my mods on Modifold, which was previously positioned as an alternative to Modrinth for Russia. BUT, after the news about the rescue of Hytale was published, the development team of this platform added support for it, and then abandoned the platform altogether. Then, on the day of Hytale's early access release (January 13, 2026), they cleaned up the entire platform and its social networks, and also completely focused on Hytale, removing support for Minecraft. Because of what happened, I am discontinuing support for this platform; they deleted my mods from there anyway.
	<h2>Skip 1.21.8</h2>
	I also announced earlier that I was going to update my projects to NeoForge 1.21.8. However, with the release of 1.21.11 and the start of snapshots for 26.1, as well as the NeoForge alpha builds for them, it became clear that this no longer made sense. It became clear that this no longer makes sense. Now the entire modding community is waiting for this version, and some mods are being updated to 1.21.1. This prompted me to change my plans, skip NeoForge 1.21.8, and wait for the next stable version for modding. For now, everyone considers 26.1 to be the stable version. In the meantime, I will focus on releasing project updates for NeoForge 1.21.1. The plans are as follows: 3.2.0 for IAAM and 6.2.0 for CMD.
	<br><br>
	Thank you to everyone who read this post. And also, Merry Christmas and Happy New Year! Good luck!
	</p>
